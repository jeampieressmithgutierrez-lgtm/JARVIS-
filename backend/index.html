<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AI // STARK PROTOCOL // CORE SYSTEM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="canvas3d-container" aria-label="Reactor Holográfico 3D"></div>

    <div class="hud-main-wrapper">
        <header class="hud-header">
            <div class="brand-stark">STARK INDUSTRIES // SYSTEM_ID: JARVIS_V2</div>
            <div class="status-clock" id="system-clock">00:00:00</div>
        </header>

        <main class="hud-center-stage">
            <div id="chat-console" class="chat-console">
                </div>
        </main>

        <footer class="hud-input-footer">
            <div class="input-container">
                <input type="text" id="command-input" placeholder="> Esperando comando de autorización...">
            </div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    
    <script src="js/core.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
