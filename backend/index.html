<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>STARK INDUSTRIES // J.A.R.V.I.S AI</title>

<link
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Share+Tech+Mono&display=swap"
rel="stylesheet">

<style>

:root{

--cyan:#00eaff;
--cyan2:#00aaff;
--gold:#ffb300;
--bg:#02060d;
--panel:rgba(5,18,30,.70);
--border:rgba(0,234,255,.25);
--text:#ecffff;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:
radial-gradient(circle at center,#071321 0%,#02060d 70%);
color:var(--text);
font-family:'Share Tech Mono',monospace;
height:100vh;
overflow:hidden;

}

header{

height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid var(--border);
background:rgba(0,0,0,.25);
backdrop-filter:blur(10px);

}

.logo{

font-family:'Orbitron',sans-serif;
font-size:26px;
font-weight:700;
letter-spacing:6px;
color:var(--cyan);
text-shadow:0 0 18px var(--cyan);

}

.status{

color:var(--gold);
font-size:14px;

}

.main{

display:grid;
grid-template-columns:320px 1fr;
height:calc(100vh - 70px);

}

.sidebar{

padding:20px;
border-right:1px solid var(--border);
background:rgba(0,0,0,.20);
overflow:auto;

}

.panel{

background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:18px;
margin-bottom:20px;
box-shadow:
0 0 25px rgba(0,234,255,.08);

}

.panel h3{

font-family:'Orbitron';
font-size:15px;
letter-spacing:2px;
margin-bottom:18px;
color:var(--cyan);

}

.metric{

margin-bottom:18px;

}

.metric label{

display:flex;
justify-content:space-between;
font-size:13px;

}
    .progress{

height:8px;
background:rgba(255,255,255,.08);
border-radius:10px;
margin-top:6px;
overflow:hidden;

}

.progress span{

display:block;
height:100%;
background:linear-gradient(90deg,var(--cyan),var(--cyan2));
box-shadow:0 0 12px var(--cyan);

}

.workspace{

display:flex;
flex-direction:column;
height:100%;

}

.core-area{

height:300px;
margin:20px;
border:1px solid var(--border);
border-radius:14px;
background:
radial-gradient(circle at center,
rgba(0,180,255,.12),
rgba(0,0,0,.2));
position:relative;
overflow:hidden;

}

#canvas3d-container{

position:absolute;
width:100%;
height:100%;
top:0;
left:0;

}

.core-title{

position:absolute;
top:15px;
left:20px;
font-size:13px;
letter-spacing:2px;
color:var(--gold);
z-index:5;

}

.chat{

flex:1;
margin:0 20px 20px;
display:flex;
flex-direction:column;
border:1px solid var(--border);
border-radius:14px;
background:rgba(0,0,0,.25);
overflow:hidden;

}

#chatBox{

flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:18px;

}

.message-wrapper{

display:flex;
width:100%;

}

.user-wrapper{

justify-content:flex-end;

}

.jarvis-wrapper{

justify-content:flex-start;

}

.message{

max-width:70%;
padding:14px;
border-radius:12px;
line-height:1.5;
font-size:15px;

}

.user-message{

background:rgba(255,179,0,.08);
border:1px solid rgba(255,179,0,.35);
color:#fff;

}

.jarvis-message{

background:rgba(0,234,255,.08);
border:1px solid rgba(0,234,255,.30);
color:#eaffff;

}

.input-area{

display:flex;
padding:15px;
gap:15px;
border-top:1px solid var(--border);

}

#userInput{

flex:1;
padding:14px;
background:#06131f;
border:1px solid var(--border);
color:white;
font-size:15px;
outline:none;
border-radius:10px;

}

#userInput:focus{

box-shadow:0 0 12px rgba(0,234,255,.25);

}

button{

width:120px;
background:transparent;
border:1px solid var(--cyan);
color:var(--cyan);
font-family:'Orbitron';
cursor:pointer;
border-radius:10px;
transition:.3s;

}

button:hover{

background:var(--cyan);
color:black;

}

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-track{

background:#03101b;

}

::-webkit-scrollbar-thumb{

background:var(--cyan);
border-radius:20px;

}

::-webkit-scrollbar-thumb:hover{

background:#4ff6ff;

}

.fade-in{

animation:fadeIn .5s ease;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(15px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.glow{

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{

filter:drop-shadow(0 0 5px var(--cyan));

}

to{

filter:drop-shadow(0 0 25px var(--cyan));

}

}

</style>

</head>

<body>

<header>

<div class="logo">

STARK INDUSTRIES // J.A.R.V.I.S AI

</div>

<div class="status">

SYSTEM ONLINE // CORE v3.0

</div>

</header>

<div class="main">

<div class="sidebar">

<div class="panel">

<h3>MONITOREO DE SISTEMA</h3>

<div class="metric">

<label>

<span>CPU CENTRAL</span>

<span id="cpuValue">28%</span>

</label>

<div class="progress">

<span style="width:28%"></span>

</div>

</div>

<div class="metric">

<label>

<span>MEMORIA RAM</span>

<span id="ramValue">64%</span>

</label>

<div class="progress">

<span style="width:64%"></span>

</div>

</div>

<div class="metric">

<label>

<span>RED GLOBAL</span>

<span>ONLINE</span>

</label>

<div class="progress">

<span style="width:100%"></span>

</div>

</div>

</div>

<div class="panel">

<h3>CONVERSACIONES</h3>

<div id="historyList">

</div>

</div>

</div>

<div class="workspace">

<div class="core-area">

<div class="core-title">

JARVIS CORE • QUANTUM PROCESSOR

</div>

<div id="canvas3d-container">

</div>

</div>    
    <div class="chat">

<div id="chatBox">

<div class="message-wrapper jarvis-wrapper fade-in">

<div class="message jarvis-message">

<strong>J.A.R.V.I.S.</strong><br><br>

Buenos días, Señor.

Todos los sistemas se encuentran operativos.

Esperando instrucciones.

</div>

</div>

</div>

<div class="input-area">

<input

type="text"

id="userInput"

placeholder="Escriba una orden para J.A.R.V.I.S..."

onkeypress="handleKeyPress(event)"

autocomplete="off"

>

<button onclick="sendMessage()">

ENVIAR

</button>

</div>

</div>

</div>

</div>

<script src="js/api.js"></script>

<script src="js/chat.js"></script>

<script src="js/core.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

if(typeof initChat==="function"){

initChat();

}

});

</script>

</body>

</html>
