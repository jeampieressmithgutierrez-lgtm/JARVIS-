<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARK INDUSTRIES // JARVIS AI // PROTOCOL V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --stark-cyan: #00f0ff;
            --stark-blue-dark: #0a1118;
            --stark-blue-panel: rgba(10, 25, 40, 0.65);
            --stark-amber: #ff8c00;
            --stark-gold: #ffb300;
            --stark-border: rgba(0, 240, 255, 0.25);
            --stark-amber-border: rgba(255, 140, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--stark-blue-dark);
            color: var(--stark-cyan);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* HEADER DE PROTOCOLO */
        header {
            border-bottom: 2px solid var(--stark-border);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,240,255,0.05) 0%, rgba(0,0,0,0) 100%);
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .system-status {
            font-size: 1rem;
            color: var(--stark-gold);
            text-shadow: 0 0 8px rgba(255, 179, 0, 0.4);
        }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* PANELES LATERALES (IZQUIERDO Y DERECHO) */
        .side-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stark-panel {
            background: var(--stark-blue-panel);
            border: 1px solid var(--stark-border);
            border-radius: 6px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .panel-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--stark-border);
            padding-bottom: 8px;
            margin-bottom: 12px;
            color: #ffffff;
        }

        /* MONITOREO TÁCTICO */
        .metric-group {
            margin-bottom: 12px;
        }
        .metric-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .progress-bar-bg {
            background: rgba(0, 240, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: var(--stark-cyan);
            height: 100%;
            box-shadow: 0 0 8px var(--stark-cyan);
        }

        /* HISTORIAL DE CHATS */
        .chat-history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            padding: 10px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .history-item:hover, .history-item.active {
            border-color: var(--stark-cyan);
            background: rgba(0, 240, 255, 0.08);
        }
        .history-item h4 { font-size: 0.9rem; color: #fff; }
        .history-item span { font-size: 0.75rem; color: rgba(0, 240, 255, 0.6); }

        /* CONTENEDOR CENTRAL (NÚCLEO + CHAT) */
        .center-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        /* VISTA DEL NÚCLEO HOLOGRÁFICO ÁMBAR */
        .hologram-viewport-container {
            height: 40%;
            min-height: 220px;
            background: radial-gradient(circle, rgba(255,140,0,0.08) 0%, rgba(0,0,0,0.3) 70%);
            border: 1px solid var(--stark-amber-border);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Div Crítico donde se inyecta WebGL/Three.js */
        #canvas-three-jarvis-core {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .hologram-overlay-text {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.8rem;
            color: var(--stark-gold);
            letter-spacing: 2px;
            z-index: 2;
            pointer-events: none;
        }

        /* ÁREA DE INTERFACES DE CHAT */
        .chat-interface-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--stark-border);
            background: rgba(5, 15, 25, 0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        /* Viewport crítico para scroll automático */
        #chat-messages-viewport {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Estilos de burbujas basados en las capturas de pantalla */
        .msg-row {
            display: flex;
            width: 100%;
        }
        .msg-row.jarvis-row { justify-content: flex-start; }
        .msg-row.user-row { justify-content: flex-end; }

        .msg-box {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .jarvis-row .msg-box {
            background: rgba(0, 240, 255, 0.06);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #e0f7fc;
        }
        .user-row .msg-box {
            background: rgba(255, 179, 0, 0.06);
            border: 1px solid rgba(255, 179, 0, 0.3);
            color: #fff3e0;
        }
        .msg-meta {
            font-size: 0.75rem;
            margin-bottom: 4px;
            opacity: 0.7;
            display: block;
        }

        /* PANEL DE ENTRADA / COMANDOS */
        .input-command-bar {
            padding: 15px;
            border-top: 1px solid var(--stark-border);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
        }

        .input-command-bar input {
            flex: 1;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--stark-border);
            padding: 12px 16px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
        }
        .input-command-bar input:focus {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .stark-btn {
            background: transparent;
            border: 1px solid var(--stark-border);
            color: var(--stark-cyan);
            padding: 0 20px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .stark-btn:hover {
            background: var(--stark-cyan);
            color: var(--stark-blue-dark);
            box-shadow: 0 0 12px var(--stark-cyan);
        }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--stark-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--stark-cyan); }
    </style>
</head>
<body>

        <div class="brand">STARK INDUSTRIES // J.A.R.V.I.S. AI</div>

    </header>

    <div class="main-container">
        
        <div class="side-panel">
